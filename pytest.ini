[pytest]
testpaths = evals
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Makes `from evals.fixtures.synthetic import ...` work without installing the package
pythonpath = .

# Markers
markers =
    slow: tests that require live models or large datasets (skip with -m "not slow")

# Default options
addopts =
    --tb=short
    -q

# Docker Compose Override for Development
# This file extends the base docker-compose.yml for development purposes

version: '3.8'

services:
  brandguard-api:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - ENVIRONMENT=development
      - DEBUG=true
      - LOG_LEVEL=DEBUG
    volumes:
      # Mount source code for development
      - .:/app
      - ./uploads:/app/uploads
      - ./results:/app/results
      - ./models:/app/models
      - ./logs:/app/logs
      - ./configs:/app/configs
    ports:
      - "8000:8000"
      - "9090:9090"  # Metrics port
    command: ["python", "run_fastapi.py", "--reload"]
    networks:
      - brandguard-network

  # Development database (if needed)
  postgres:
    image: postgres:15-alpine
    container_name: brandguard-postgres-dev
    environment:
      - POSTGRES_DB=brandguard
      - POSTGRES_USER=brandguard
      - POSTGRES_PASSWORD=brandguard123
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - brandguard-network

  # Development Redis
  redis:
    image: redis:7-alpine
    container_name: brandguard-redis-dev
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - brandguard-network

  # Development monitoring
  prometheus:
    image: prom/prometheus:latest
    container_name: brandguard-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--web.enable-lifecycle'
    networks:
      - brandguard-network

  grafana:
    image: grafana/grafana:latest
    container_name: brandguard-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - brandguard-network

volumes:
  postgres_data:
  redis_data:
  grafana_data:

networks:
  brandguard-network:
    driver: bridge

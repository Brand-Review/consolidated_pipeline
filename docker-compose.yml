version: '3.8'

services:
  brandguard-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: brandguard-consolidated-api
    ports:
      - "8000:8000"
    volumes:
      - ./uploads:/app/uploads
      - ./results:/app/results
      - ./models:/app/models
      - ./logs:/app/logs
      - ./configs:/app/configs
    environment:
      - PYTHONPATH=/app
      - ENVIRONMENT=production
      - LOG_LEVEL=INFO
      - MAX_FILE_SIZE=52428800
      - UPLOAD_DIR=/app/uploads
      - RESULTS_DIR=/app/results
      - MODELS_DIR=/app/models
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - brandguard-network

  # Optional: Redis for caching (if needed in future)
  redis:
    image: redis:7-alpine
    container_name: brandguard-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped
    networks:
      - brandguard-network

  # Optional: Nginx reverse proxy (for production)
  nginx:
    image: nginx:alpine
    container_name: brandguard-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    depends_on:
      - brandguard-api
    restart: unless-stopped
    networks:
      - brandguard-network

volumes:
  redis_data:

networks:
  brandguard-network:
    driver: bridge

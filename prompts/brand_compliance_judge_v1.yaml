version: "v1"
name: "brand_compliance_judge"
description: >
  Unified OpenRouter multimodal brand compliance call. One LLM pass replaces
  PaddleOCR, font classifier, HybridToneAnalyzer, and the per-analyzer
  copywriting/logo judge. Returns text, fonts, logo verdicts, color verification,
  and 4-dimension compliance scores.

system: |
  You are a senior brand compliance expert and visual designer.
  You will receive:
  - Brand guidelines (from the brand's document)
  - YOLO logo detections (may be empty or inaccurate)
  - k-means dominant colors extracted from the image
  - Few-shot approved/rejected examples
  - The actual image

  Your job: review the image thoroughly and return a single JSON object.
  Return JSON ONLY — no markdown, no explanation.

# Static part — contains only per-brand content (cacheable for Anthropic models)
user_template_static: |
  ## Brand Rules (authoritative — score strictly against these)
  {brand_rules}

  ## Brand Guidelines (training examples)
  {brand_context}

# Dynamic part — contains per-image data, tasks, and output schema
user_template_dynamic: |
  ## YOLO Logo Detections (verify each; add any logos YOLO missed)
  {logo_detections_json}

  ## k-means Dominant Colors (hex, percentage, saliency_weight)
  {dominant_colors_json}

  ## Tasks
  1. Verify each YOLO detection (source:"yolo"): is it a real logo? If not, set is_logo=false and explain.
  2. Detect logos YOLO missed; add as source:"llm" entries.
  3. Confirm or correct the dominant color palette (color_verification).
  4. Extract ALL visible text (extracted_text).
  5. For each text region: identify font family, style, approximate size (detected_fonts).
  6. Score 0.0–1.0 for each dimension:
     - color: match of intentional brand elements to palette. Exclude canvas/neutral backgrounds; include shapes, icons, accents, gradients. Score MUST be <0.65 if any off-palette color has meaningful visual presence on prominent elements.
     - logo: placement, size, visibility, brand identity.
     - typography: fonts match brand-approved fonts.
     - copywriting: tone, voice, grammar, messaging.
  7. Detect grammar/spelling/punctuation errors (grammar_analysis). Empty errors list if none found.
  8. Assess brand tone/voice vs. brand voice rules (tone_analysis).

  Return ONLY this JSON (no markdown):
  {{
    "extracted_text": "string",
    "detected_fonts": [{{"family": "string", "region": "headline|body|tagline|other", "size_approx": 0, "style": "regular|bold|italic"}}],
    "logo_judgements": [{{"source": "yolo|llm", "detection_id": 0, "bbox": [0,0,0,0], "is_logo": true, "brand_identified": "string|null", "confidence_ok": true, "placement_zone": "top-left|top-right|bottom-left|bottom-right|center|other", "reason": "string (only when is_logo=false)"}}],
    "color_verification": {{"accurate": true, "corrected_palette": ["#hex"], "notes": "string"}},
    "color":       {{"score": 0.0, "reason": "string"}},
    "logo":        {{"score": 0.0, "reason": "string"}},
    "typography":  {{"score": 0.0, "reason": "string"}},
    "copywriting": {{"score": 0.0, "reason": "string"}},
    "grammar_analysis": {{"errors": [{{"text": "string", "error_type": "spelling|grammar|punctuation", "suggestion": "string"}}], "error_count": 0, "summary": "string"}},
    "tone_analysis": {{"detected_tone": "professional|casual|warm|motivational|formal|urgent|other", "on_brand": true, "assessment": "string"}}
  }}

# Appended to user_template_dynamic only when verdict_mode == 'llm'
verdict_addendum: |
  Also provide an explicit verdict:
  - "approved": the asset meets brand standards overall
  - "rejected": the asset fails brand standards and should not be used
  Add to the JSON: "verdict": "approved"|"rejected", "verdict_reason": "one sentence"

version: "v1"
name: "copywriting_image_openrouter"
description: >
  Image OCR + grammar/tone + typography analysis for OpenRouterToneAnalyzer
  (claude-opus-4.6 or gpt-4o). Extends the VLLM variant with a full typography
  section (font detection, sizes, weights, compliance).

user_template: |
  Carefully examine the provided image and perform the following tasks in order:

  1. **Text Extraction (OCR)**
     - Extract **all visible text** from the image, including headlines, captions, UI labels, overlaid text, and fine print.
     - Preserve the **exact wording**, punctuation, and casing as seen.
     - Ignore illegible handwriting, logos, or decorative text.

  2. **Grammar, Spelling, and Punctuation Analysis (CRITICAL)**
     Be extremely strict and professional:
     - Detect **spelling mistakes**, **grammar/syntax issues**, and **punctuation errors**.
     - Identify **capitalization inconsistencies** and **word agreement errors**.
     - Do **not** rewrite or paraphrase text; only identify and suggest minimal corrections.
     - Mark each error with a **severity** (High | Medium | Low) and a **short explanation (≤20 words)**.

  3. **Typography Analysis (CRITICAL)**
     Analyze all typography elements in the image:
     - **Font Detection**: Identify font families/font names for each text region (e.g., "Arial", "Helvetica", "Times New Roman", "Roboto", "Custom Sans-Serif")
     - **Font Sizes**: Estimate or identify font sizes in points (pt) or pixels (px) for different text elements
     - **Font Styles**: Identify font weights (bold, regular, light) and styles (italic, normal)
     - **Text Regions**: List each distinct text region with its typography details
     - **Font Consistency**: Check if multiple fonts are used and note inconsistencies
     - **Typography Compliance**: Assess if fonts match brand guidelines (if applicable)
     - Provide confidence scores (0.0-1.0) for font identifications

  4. **Output Requirements (CRITICAL)**
     - You MUST output the final JSON in the **content field**, NOT in reasoning.
     - Respond with **ONLY a valid JSON object** (no markdown, no code blocks, no text before or after the JSON).
     - Start your response with `{{` and end with `}}`.
     - All numeric scores must be integers (0–100) or floats (0.0–1.0).
     - After your reasoning, output the complete JSON object as the final answer.

  5. **Settings Context**
     Formality {formality_score}/100,
     Confidence {confidence_level},
     Warmth {warmth_score}/100,
     Energy {energy_score}/100,
     Readability {readability_level},
     Persona {persona_type},
     Emojis allowed: {allow_emojis},
     Slang allowed: {allow_slang}.

  6. **JSON Output Format**
  {{
      "extracted_text": "exact text content visible in the image",
      "grammar_analysis": {{
          "grammar_score": 85,
          "errors": [
              {{
                  "error_type": "Spelling | Grammar | Punctuation | Capitalization | Agreement",
                  "original_text": "orginal",
                  "suggested_fix": "original",
                  "explanation": "Correct spelling mistake",
                  "severity": "Low"
              }}
          ],
          "summary": "2 minor grammar and 1 punctuation issue detected"
      }},
      "tone_analysis": {{
          "formality_score": 75,
          "confidence_level": "high",
          "warmth_score": 60,
          "energy_score": 50,
          "sentiment": "positive",
          "readability_score": 80
      }},
      "spelling_errors": ["orginal"],
      "punctuation_issues": ["Missing comma after 'However'"],
      "text_metrics": {{
          "word_count": 120,
          "sentence_count": 8,
          "avg_words_per_sentence": 15.0,
          "readability_level": "grade 8"
      }},
      "visual_elements": {{
          "colors": ["blue", "white"],
          "layout": "centered text",
          "branding": "company logo visible",
          "text_placement": "center of image"
      }},
      "typography_analysis": {{
          "detected_fonts": [
              {{
                  "font_family": "Arial",
                  "font_size": 24,
                  "font_weight": "bold",
                  "font_style": "normal",
                  "confidence": 0.95,
                  "text_regions": ["Headline text"],
                  "bbox": [100, 50, 400, 100],
                  "font_approved": true
              }}
          ],
          "font_consistency": {{
              "unique_fonts_count": 2,
              "is_consistent": false,
              "inconsistencies": ["Multiple font families detected"]
          }},
          "compliance_score": 0.88,
          "violations": [],
          "recommendations": ["Consider standardizing font families for brand consistency"]
      }},
      "compliance": {{
          "score": 0.92,
          "failures": [],
          "suggestions": ["Proofread to correct minor errors"],
          "failure_summary": "Minor grammar and punctuation issues found"
      }}
  }}

chunking:
  default_strategy: recursive   # fixed | recursive | semantic
  fixed:
    chunk_size: 800
    overlap: 100
  recursive:
    separators: ["\n# ", "\n## ", "\n### ", "\n\n", "\n", ". ", " "]
    chunk_size: 800
    min_chunk_size: 100
  semantic:
    embedding_model: intfloat/multilingual-e5-large
    breakpoint_percentile: 90
    min_chunk_chars: 200
    max_chunk_chars: 1500

embeddings:
  dense_model: intfloat/multilingual-e5-large
  dense_dim: 1024
  sparse_model: Qdrant/bm25
  sparse_tokenizer: word
  sparse_lowercase: true

dedup:
  enabled: true
  cosine_threshold: 0.95
  scope: within_brand

s3:
  prefix: brand-onboarding

retrieval:
  candidate_pool_size: 20
  final_top_k: 5
  fusion:
    algorithm: rrf           # rrf | dbsf
    rrf_k: 60
    weights:
      dense: 0.7
      sparse: 0.3
  per_source_top_k:
    dense: 10
    sparse: 10
  reranker:
    enabled: true
    type: cross_encoder      # cross_encoder | llm_judge | none
    model: BAAI/bge-reranker-base
    batch_size: 20
    timeout_seconds: 5
  fallback:
    on_sparse_failure: dense_only   # dense_only | fail
    on_reranker_failure: skip_rerank # skip_rerank | fail

generation:
  temperature: 0.0
  max_tokens: 800
  max_context_chunks: 5
  sanitize:
    max_question_chars: 2000

verification:
  enabled: true
  max_concurrent_verifications: 5
  per_claim_timeout_seconds: 10
  on_timeout_status: unverified   # unverified | unsupported

confidence:
  weights:
    retrieval: 0.4
    citation_coverage: 0.4
    completeness: 0.2
  thresholds:
    idk_composite: 0.4
    idk_retrieval: 0.3
